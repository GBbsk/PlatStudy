<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula - JS Deep Dive</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: {
                            850: '#1e293b',
                            950: '#020617',
                        }
                    }
                }
            }
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* Typography para o conteúdo da aula (Modo Claro) */
        .prose h2 { font-size: 1.5rem; font-weight: 700; margin-top: 2rem; margin-bottom: 1rem; color: #1e293b; }
        .prose p { margin-bottom: 1.25rem; line-height: 1.75; color: #475569; }
        .prose ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1.5rem; color: #475569; }
        .prose li { margin-bottom: 0.5rem; }
        .prose strong { color: #0f172a; font-weight: 600; }
        .prose code:not(.hljs) { background-color: #e2e8f0; color: #db2777; padding: 2px 4px; border-radius: 4px; font-family: monospace; font-size: 0.9em;}
        .prose pre { border-radius: 8px; margin-bottom: 1.5rem; overflow-x: auto; }
        .warning-box { border-left: 4px solid #f59e0b; background-color: #fffbeb; padding: 1rem; margin-bottom: 1.5rem; border-radius: 0 8px 8px 0; color: #92400e; }

        /* Typography Overrides para Modo Noturno */
        .dark .prose h2 { color: #f1f5f9; }
        .dark .prose p { color: #cbd5e1; }
        .dark .prose ul { color: #cbd5e1; }
        .dark .prose strong { color: #e2e8f0; }
        .dark .prose code:not(.hljs) { background-color: #334155; color: #f472b6; }
        .dark .warning-box { background-color: #451a03; border-color: #d97706; color: #fcd34d; }

        /* Animação */
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 min-h-screen flex flex-col transition-colors duration-300">

    <header class="bg-slate-900 text-white py-4 shadow-md sticky top-0 z-50 border-b border-slate-800">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 text-slate-300 hover:text-white transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
                </svg>
                <span class="font-bold text-sm uppercase tracking-wider">Voltar</span>
            </a>
            
            <div class="flex items-center gap-4">
                <div class="font-mono text-yellow-400 font-bold hidden md:block" id="headerLessonId">...</div>
                
                <button id="theme-toggle" class="p-2 rounded-full bg-slate-800 hover:bg-slate-700 text-yellow-400 transition-colors focus:outline-none border border-slate-700">
                    <svg id="theme-toggle-light-icon" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" fill-rule="evenodd" clip-rule="evenodd"></path></svg>
                    <svg id="theme-toggle-dark-icon" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                </button>
            </div>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-4 md:px-6 py-10 max-w-4xl">
        
        <div id="loading" class="text-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-slate-900 dark:border-white mx-auto"></div>
            <p class="mt-4 text-slate-500 dark:text-slate-400">Carregando conteúdo didático...</p>
        </div>

        <article id="content" class="bg-white dark:bg-slate-900 rounded-2xl shadow-xl p-8 md:p-12 hidden transition-colors duration-300 border border-transparent dark:border-slate-800">
            <div class="border-b border-slate-200 dark:border-slate-700 pb-8 mb-8">
                <span id="lessonTag" class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wide">...</span>
                <h1 id="lessonTitle" class="text-3xl md:text-4xl font-black text-slate-900 dark:text-white mt-4 leading-tight">...</h1>
                <p id="lessonSubtitle" class="text-lg text-slate-500 dark:text-slate-400 mt-2 font-light">...</p>
            </div>

            <div id="lessonBody" class="prose max-w-none">
                </div>

            <div class="mt-12 pt-8 border-t border-slate-200 dark:border-slate-700 flex justify-between items-center">
                <button id="prevBtn" class="text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300 font-semibold text-sm disabled:opacity-30 disabled:cursor-not-allowed">← Anterior</button>
                <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="bg-slate-900 dark:bg-slate-700 text-white px-6 py-2 rounded-lg hover:bg-slate-800 dark:hover:bg-slate-600 transition-colors shadow-lg">Voltar ao Topo</button>
                <button id="nextBtn" class="text-indigo-600 dark:text-indigo-400 hover:text-indigo-800 dark:hover:text-indigo-300 font-bold text-sm disabled:opacity-30 disabled:cursor-not-allowed">Próxima →</button>
            </div>
        </article>
    </main>

    <script>
        // --- 1. BANCO DE DADOS DAS AULAS (EXTERNO) ---
        let lessons = {};
        let lessonIds = [];

        // --- 2. LÓGICA DE TEMA (DARK MODE) ---
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
        const themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');
        const html = document.documentElement;

        function updateIcons(isDark) {
            if (isDark) {
                themeToggleDarkIcon.classList.add('hidden');
                themeToggleLightIcon.classList.remove('hidden');
            } else {
                themeToggleLightIcon.classList.add('hidden');
                themeToggleDarkIcon.classList.remove('hidden');
            }
        }

        // Checar preferência inicial
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            html.classList.add('dark');
            updateIcons(true);
        } else {
            html.classList.remove('dark');
            updateIcons(false);
        }

        themeToggleBtn.addEventListener('click', function() {
            html.classList.toggle('dark');
            const isDark = html.classList.contains('dark');
            localStorage.setItem('color-theme', isDark ? 'dark' : 'light');
            updateIcons(isDark);
            
            // Recarregar cores do módulo se o conteúdo já estiver renderizado
            const urlParams = new URLSearchParams(window.location.search);
            const lessonId = urlParams.get('id');
            if(lessonId && lessons[lessonId]) {
                 // Pequeno hack para re-aplicar a cor correta da tag baseada no tema
                 renderTagColor(lessons[lessonId].themeColor);
            }
        });

        // --- 3. LÓGICA DE CARREGAMENTO ---
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const lessonId = urlParams.get('id') || "1.1"; // Fallback para 1.1 para teste
            
            try {
                const response = await fetch('aulas.json');
                if (!response.ok) throw new Error('Falha ao carregar aulas.json');
                lessons = await response.json();
                
                // Ordenar IDs numericamente (1.1, 1.2, 2.1, etc)
                lessonIds = Object.keys(lessons).sort((a, b) => {
                    const partsA = a.split('.').map(Number);
                    const partsB = b.split('.').map(Number);
                    for (let i = 0; i < Math.max(partsA.length, partsB.length); i++) {
                        if ((partsA[i] || 0) !== (partsB[i] || 0)) {
                            return (partsA[i] || 0) - (partsB[i] || 0);
                        }
                    }
                    return 0;
                });

                const data = lessons[lessonId] || lessons["1.1"];
                renderLesson(lessonId, data);
                updateNavigation(lessonId);
            } catch (error) {
                console.error('Erro:', error);
                document.getElementById('loading').innerHTML = `
                    <div class="text-red-500 p-4 bg-red-50 rounded-lg border border-red-200">
                        <h3 class="font-bold">Erro ao carregar conteúdo</h3>
                        <p class="text-sm">Não foi possível carregar os dados das aulas. Certifique-se de que está usando um servidor local ou hospedado.</p>
                    </div>
                `;
            }
        });

        function updateNavigation(currentId) {
            const index = lessonIds.indexOf(currentId);
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');

            if (index > 0) {
                prevBtn.disabled = false;
                prevBtn.onclick = () => window.location.href = `aula.html?id=${lessonIds[index - 1]}`;
            } else {
                prevBtn.disabled = true;
            }

            if (index < lessonIds.length - 1 && index !== -1) {
                nextBtn.disabled = false;
                nextBtn.onclick = () => window.location.href = `aula.html?id=${lessonIds[index + 1]}`;
            } else {
                nextBtn.disabled = true;
            }
        }

        function renderTagColor(colorName) {
            // Mapa de cores com suporte a Dark Mode (bg transparente e texto mais claro)
            const colorMap = {
                'indigo':  'bg-indigo-100 text-indigo-700 dark:bg-indigo-900/50 dark:text-indigo-300',
                'sky':     'bg-sky-100 text-sky-700 dark:bg-sky-900/50 dark:text-sky-300',
                'emerald': 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/50 dark:text-emerald-300',
                'amber':   'bg-amber-100 text-amber-700 dark:bg-amber-900/50 dark:text-amber-300',
                'rose':    'bg-rose-100 text-rose-700 dark:bg-rose-900/50 dark:text-rose-300',
                'purple':  'bg-purple-100 text-purple-700 dark:bg-purple-900/50 dark:text-purple-300',
                'orange':  'bg-orange-100 text-orange-700 dark:bg-orange-900/50 dark:text-orange-300',
                'yellow':  'bg-yellow-100 text-yellow-800 dark:bg-yellow-900/50 dark:text-yellow-300',
                'slate':   'bg-slate-100 text-slate-700 dark:bg-slate-800 dark:text-slate-300'
            };
            
            const themeClass = colorMap[colorName] || colorMap['slate'];
            document.getElementById('lessonTag').className = `px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wide ${themeClass}`;
        }

        function renderLesson(id, data) {
            document.getElementById('loading').classList.add('hidden');
            const contentDiv = document.getElementById('content');
            contentDiv.classList.remove('hidden');
            contentDiv.classList.add('fade-in');

            document.getElementById('headerLessonId').textContent = id ? `AULA ${id}` : '404';
            document.getElementById('lessonTag').textContent = data.module;
            document.getElementById('lessonTitle').textContent = data.title;
            document.getElementById('lessonSubtitle').textContent = data.subtitle;
            document.getElementById('lessonBody').innerHTML = data.content;

            // Aplica cores
            renderTagColor(data.themeColor);

            hljs.highlightAll();
        }
    </script>

</body>
</html>
